<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Figurative: a leg with an arrow pointing at the SHIN (front of the lower leg). -->
  <!-- ink outline behind, warm fill on top => a 2px outlined limb -->
  <path d="M46 16 L46 78 L72 82" fill="none" stroke="#3d3833" stroke-width="16"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M46 16 L46 78 L72 82" fill="none" stroke="#c9b48f" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arrow: from the right, tip on the front of the lower leg (the shin) -->
  <path d="M92 50 L58 56" fill="none" stroke="#3d3833" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M58 56 L67 52 M58 56 L66 62" fill="none" stroke="#3d3833" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
